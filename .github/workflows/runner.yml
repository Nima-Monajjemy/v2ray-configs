name: Update V2Ray Configs

on:
  schedule:
    - cron: '0 */6 * * *'   # هر ۶ ساعت
  workflow_dispatch:         # اجرای دستی

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 350  # افزایش زمان اجرا به ۳۵۰ دقیقه (حداکثر ۳۶۰)
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install telethon requests

      - name: Run script
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          SESSION_STRING: ${{ secrets.SESSION_STRING }}
        run: python update_configs.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add configs.txt tested_configs.db
          git diff --quiet && git diff --staged --quiet || (git commit -m "🔄 Update configs with DB cache" && git push)
